networks:
  pgnet:
    driver: bridge

services:

  workspace:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    networks:
      - pgnet

  postgres:
    image: postgres:16
    restart: unless-stopped
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - pgnet

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@sql.dev
      PGADMIN_DEFAULT_PASSWORD: 1234
      # Modo escritorio: pgAdmin no pide login (lab de un solo usuario local).
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      # pgAdmin corre detras del proxy de Codespaces, que TERMINA el TLS y le
      # reenvia por HTTP. Sin esto pgAdmin cree que la peticion es HTTP, genera
      # mal la cookie de sesion/URLs y las XHR autenticadas (preferences/get_all,
      # misc/bgprocess, status...) dan 401 -> pagina en blanco (los estaticos si
      # cargan, por eso 200). Estas variables activan el ProxyFix: pgAdmin confia
      # en las cabeceras X-Forwarded-* del proxy (1 salto) y reconstruye el
      # esquema (https) y host reales.
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
    ports:
      - "5050:80"
    volumes:
      # Pre-registra el servidor PostgreSQL: los alumnos no tienen que
      # registrarlo a mano, ya aparece bajo "Servers" al abrir pgAdmin.
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpassfile:/pgpassfile
      # Montar data/ directamente sobre el subdirectorio del usuario de pgAdmin.
      # pgAdmin escribe los backups en /var/lib/pgadmin/storage/postgres_sql.dev/
      # y como ese path ya existe como mount point, no intenta crearlo ni hacerle chmod 700.
      # Resultado: los archivos quedan en data/ sin subcarpeta intermedia.
      - ../data:/var/lib/pgadmin/storage/postgres_sql.dev
    networks:
      - pgnet
