networks:
  pgnet:
    driver: bridge

services:

  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    networks:
      - pgnet

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - pgnet

  pgadmin:
    image: dpage/pgadmin4:9.16
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@sql.dev
      PGADMIN_DEFAULT_PASSWORD: 1234
      # pgAdmin corre detrás del proxy de Codespaces, que TERMINA el TLS y le
      # reenvía por HTTP. Sin esto pgAdmin cree que la petición es HTTP, genera
      # mal la cookie de sesión/URLs y las XHR autenticadas dan 401.
      # Estas variables activan el ProxyFix: pgAdmin confía en las cabeceras
      # X-Forwarded-* del proxy (1 salto) y reconstruye el esquema (https) real.
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpassfile:/pgpassfile
      - ../data:/var/lib/pgadmin/storage/postgres_sql.dev
    depends_on:
      - postgres
    networks:
      - pgnet
